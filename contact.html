<main>
    <section class="form-box">
        <h2>Contact Me</h2>

        <form action="#" method="post">
            <fieldset>
                <legend>Personal Information</legend>

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required maxlength="60">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required maxlength="80">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required maxlength="15">
                </div>

                <div class="form-group">
                    <label for="age">Age</label>
                    <input type="number" id="age" name="age" min="18" max="60" required>
                </div>

                <div class="form-group">
                    <label for="date">Preferred Contact Date</label>
                    <input type="date" id="date" name="date" required>
                </div>

                <div class="form-group">
                    <label for="range">Interest Level (1 to 10)</label>
                    <input type="range" id="range" name="range" min="1" max="10">
                </div>
            </fieldset>

            <fieldset>
                <legend>Message Details</legend>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <select id="subject" name="subject" required>
                        <optgroup label="General">
                            <option value="question">Question</option>
                            <option value="feedback">Feedback</option>
                        </optgroup>
                        <optgroup label="Professional">
                            <option value="job">Job Opportunity</option>
                            <option value="project">Project Collaboration</option>
                        </optgroup>
                    </select>
                </div>

                <div class="form-group">
                    <label>Services Needed</label>
                    <div class="choice-group">
                        <div class="choice-item">
                            <input type="checkbox" id="webdesign" name="services" value="webdesign">
                            <label for="webdesign">Web Design</label>
                        </div>
                        <div class="choice-item">
                            <input type="checkbox" id="frontend" name="services" value="frontend">
                            <label for="frontend">Frontend Help</label>
                        </div>
                        <div class="choice-item">
                            <input type="checkbox" id="backend" name="services" value="backend">
                            <label for="backend">Backend Help</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Preferred Contact Method</label>
                    <div class="choice-group">
                        <div class="choice-item">
                            <input type="radio" id="contactemail" name="contactmethod" value="email" required>
                            <label for="contactemail">Email</label>
                        </div>
                        <div class="choice-item">
                            <input type="radio" id="contactphone" name="contactmethod" value="phone">
                            <label for="contactphone">Phone</label>
                        </div>
                        <div class="choice-item">
                            <input type="radio" id="contactwhatsapp" name="contactmethod" value="whatsapp">
                            <label for="contactwhatsapp">WhatsApp</label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="6" cols="40" placeholder="Write your message here" maxlength="300" required></textarea>
                </div>

                <button type="submit">Send Message</button>
            </fieldset>
        </form>
    </section>
</main>
